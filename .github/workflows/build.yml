name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout quiet library
        run: git clone --recursive https://github.com/hebo6/org.quietmodem.Quiet.git ../org.quietmodem.Quiet

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-26" "build-tools;26.0.2" "build-tools;34.0.0"

      - name: Install NDK
        run: |
          sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Download prebuilt native libraries
        run: |
          set -euxo pipefail
          ABI=arm64-v8a
          JNI=$(cd ../org.quietmodem.Quiet/quiet/src/main/jni && pwd)
          LIB=$JNI/lib/$ABI
          INC=$JNI/include/$ABI
          mkdir -p $LIB $INC/quiet-lwip

          # libquiet bundles jansson/fec/libcorrect statically; only libquiet and
          # libliquid are published as shared libs.
          curl -fsSL -o /tmp/quiet-android.zip \
            https://github.com/hebo6/quiet/releases/latest/download/quiet-android-$ABI.zip
          unzip -q /tmp/quiet-android.zip -d /tmp/
          Q=/tmp/quiet-android-$ABI
          cp $Q/lib/libquiet.so  $LIB/
          cp $Q/lib/libliquid.so $LIB/
          cp $Q/include/quiet.h  $INC/

          curl -fsSL -o /tmp/quiet-lwip-android.zip \
            https://github.com/hebo6/quiet-lwip/releases/latest/download/quiet-lwip-android-$ABI.zip
          unzip -q /tmp/quiet-lwip-android.zip -d /tmp/
          QL=/tmp/quiet-lwip-android-$ABI
          cp $QL/lib/libquiet_lwip.so $LIB/
          cp $QL/include/quiet-lwip/lwip-socket.h $INC/quiet-lwip/
          cp -r $QL/include/lwip $INC/quiet-lwip/

      - name: Patch JNI build config
        run: |
          set -euxo pipefail
          JNI=../org.quietmodem.Quiet/quiet/src/main/jni
          # Android.mk: avoid socklen_t redefinition and enable lwip DNS/AutoIP
          sed -i 's|LOCAL_CFLAGS := |LOCAL_CFLAGS := -DSOCKLEN_T_DEFINED -DLWIP_DNS=1 -DLWIP_AUTOIP=1 |' $JNI/Android.mk
          # Android.mk: remove fec/jansson prebuilt modules (statically linked into libquiet.so)
          sed -i '/LOCAL_MODULE := fec-prebuilt/,/include $(PREBUILT_SHARED_LIBRARY)/d' $JNI/Android.mk
          sed -i '/LOCAL_MODULE := jansson-prebuilt/,/include $(PREBUILT_SHARED_LIBRARY)/d' $JNI/Android.mk
          sed -i 's/ fec-prebuilt jansson-prebuilt//' $JNI/Android.mk
          # Application.mk: only build arm64-v8a; match libquiet.so's android-24 baseline;
          # disable C++ STL (pure C code; libstdc++.so causes linker namespace conflict)
          sed -i 's|^APP_ABI.*|APP_ABI := arm64-v8a|' $JNI/Application.mk
          sed -i 's|^APP_PLATFORM.*|APP_PLATFORM := android-24|' $JNI/Application.mk
          grep -q '^APP_STL' $JNI/Application.mk || echo 'APP_STL := none' >> $JNI/Application.mk

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -x lint -x lintVitalRelease

      - name: Sign APK
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          APK_IN=app/build/outputs/apk/app-release-unsigned.apk
          APK_ALIGNED=/tmp/app-release-aligned.apk
          APK_SIGNED=/tmp/app-release-signed.apk
          KEYSTORE=/tmp/release.jks
          # Decode keystore from secret
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > $KEYSTORE
          # Align
          $BUILD_TOOLS/zipalign -v -p 4 $APK_IN $APK_ALIGNED
          # Sign
          $BUILD_TOOLS/apksigner sign \
            --ks $KEYSTORE \
            --ks-key-alias ${{ secrets.ALIAS }} \
            --ks-pass pass:${{ secrets.KEY_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out $APK_SIGNED \
            $APK_ALIGNED
          # Verify
          $BUILD_TOOLS/apksigner verify --verbose $APK_SIGNED

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiet-android-release-apk
          path: /tmp/app-release-signed.apk
